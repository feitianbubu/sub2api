name: Build and push Docker image (Docker Hub)

# push 到 fork 的 dev 分支(或手动触发)时,用自包含的多阶段 Dockerfile 构建镜像
# 并推送到 Docker Hub skynono/sub2api。
# 构建流程见根目录 Dockerfile(Stage1: pnpm 编译前端 -> Stage2: Go 编译后端并内嵌前端
# -> 最终运行镜像),因此这里无需单独跑前端/Go 步骤,直接交给 build-push-action 即可。

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & push AMD64 image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Resolve build metadata
        id: vars
        run: |
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: skynono/sub2api
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GOPROXY/GOSUMDB 覆盖为官方源:Dockerfile 默认用 goproxy.cn 镜像,
          # 在 GitHub 托管 runner(海外)上拉取反而不稳,这里改回官方源更可靠。
          build-args: |
            VERSION=${{ github.ref_name }}-${{ steps.vars.outputs.short_sha }}
            COMMIT=${{ steps.vars.outputs.short_sha }}
            DATE=${{ steps.vars.outputs.date }}
            GOPROXY=https://proxy.golang.org,direct
            GOSUMDB=sum.golang.org
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
